name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install numpy pytest
      - name: Run D-S algorithm tests
        run: |
          cd tests/unit
          python -m pytest test_ds_evidence.py -v

  firmware-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi
      - name: Check firmware compiles (syntax only)
        run: |
          cd algorithm/c
          arm-none-eabi-gcc -c -mcpu=cortex-m3 -mthumb -Wall -Wextra -Os \
            -DSTM32F103xB ds_evidence.c -o /dev/null 2>&1 || \
          echo "Note: Full build requires HAL headers - syntax check only"
